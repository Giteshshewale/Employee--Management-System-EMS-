{% extends 'base.html' %}
{% block title %}Delete Employee{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 text-center">
            <h5 class="text-danger mb-3"><i class="bi bi-exclamation-triangle-fill"></i> Delete Employee</h5>
            <p>Are you sure you want to delete <strong>{{ employee.full_name }}</strong>? This cannot be undone.</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'employees:list' %}" class="btn btn-outline-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
