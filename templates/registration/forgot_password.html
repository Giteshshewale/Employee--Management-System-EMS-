{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="card auth-card p-4">
        <div class="card-body">
            <h3 class="text-center mb-1"><i class="bi bi-question-circle-fill"></i> Forgot Password</h3>
            <p class="text-center text-muted mb-4">Enter your username and email to get a temporary password.</p>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100">Send Temporary Password</button>
            </form>
            <p class="text-center mt-3 mb-0"><a href="{% url 'accounts:login' %}">Back to login</a></p>
        </div>
    </div>
</div>
{% endblock %}
