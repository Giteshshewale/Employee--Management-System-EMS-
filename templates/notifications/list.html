{% extends 'base.html' %}
{% block title %}Notifications - EMS{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Notifications</h3>
    <a href="{% url 'notifications:mark_all_read' %}" class="btn btn-outline-secondary btn-sm">Mark all as read</a>
</div>
<div class="card p-3">
    <ul class="list-group list-group-flush">
        {% for n in page_obj %}
        <li class="list-group-item d-flex justify-content-between align-items-center {% if not n.is_read %}fw-bold{% endif %}">
            {{ n.message }}
            <small class="text-muted">{{ n.created_at|timesince }} ago</small>
        </li>
        {% empty %}
        <li class="list-group-item text-muted text-center">No notifications yet.</li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
